{% extends "base.html" %}
{% block title %}Settings - WinScan Pro{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Settings</h1>
    <p>Configure global scanner preferences and default plugins.</p>
</div>

<form action="{{ url_for('settings') }}" method="POST">
    <div class="panel">
        <div class="panel-header"><h2>Vulnerability Plugins (Global Defaults)</h2></div>
        <div class="panel-body">
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" name="smb_anon" {% if config.smb_anon %}checked{% endif %}> 
                    SMB Anonymous Shares
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="smb_v1" {% if config.smb_v1 %}checked{% endif %}> 
                    SMBv1 Enabled
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="winrm_hotfix" {% if config.winrm_hotfix %}checked{% endif %}> 
                    WinRM Hotfix Enumeration
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="rdp_open" {% if config.rdp_open %}checked{% endif %}> 
                    Open RDP Access
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="smb_signing" {% if config.smb_signing %}checked{% endif %}> 
                    Weak SMB Signing
                </label>
            </div>
        </div>
    </div>
    <div class="action-buttons">
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </div>
</form>
{% endblock %}
